# ══════════════════════════════════════════════════════════════
#  Nginx — JugaHoyWeb
#  Reemplazar TU_DOMINIO.COM por el dominio real (ej: jugahoy.com.ar)
#  Reemplazar /RUTA/AL/PROYECTO por la ruta real (ej: /var/www/jugahoyweb)
#
#  Copiar a: /etc/nginx/sites-available/jugahoyweb
#  Activar:  sudo ln -s /etc/nginx/sites-available/jugahoyweb /etc/nginx/sites-enabled/
#  Probar:   sudo nginx -t
#  Recargar: sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════

# Redirige HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    # Let's Encrypt ACME challenge (certbot lo necesita para el primer SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    # ── Certificados SSL (certbot los genera automáticamente) ──
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.COM/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Seguridad básica ───────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Frontend React (archivos estáticos del build) ──────────
    root /RUTA/AL/PROYECTO/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # SPA: todas las rutas → index.html
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── PWA: el service worker NUNCA se cachea ─────────────────
    # (si se cachea, los usuarios no reciben actualizaciones nuevas)
    # `location =` es match exacto → tiene prioridad sobre el regex de abajo.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        access_log off;
    }

    # ── PWA: manifest con su mime-type correcto y caché corta ──
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }

    # Assets con hash en el nombre → caché agresivo
    # (sw.js y manifest.webmanifest ya se resolvieron arriba con `location =`)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API → Node.js backend (puerto 5003) ────────────────────
    location /api {
        proxy_pass         http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 10m;  # tamaño máximo de upload
    }

    # ── Archivos subidos (imágenes del sistema) ────────────────
    location /uploads {
        alias /RUTA/AL/PROYECTO/backend/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Webhook WhatsApp (sin límite de rate — Meta reintenta) ─
    location /api/chatbot/webhook {
        proxy_pass         http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }
}
