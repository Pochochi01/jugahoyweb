<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon del navegador: emblema (más legible en tamaño chico) con fondo transparente -->
    <link rel="icon" type="image/png" href="/emblem.png" />
    <link rel="shortcut icon" href="/emblem.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JugaHoy – Gestión de Complejos Deportivos</title>
    <meta name="description" content="Plataforma integral para gestión y reserva de complejos deportivos" />

    <!-- ── PWA ──
         El color de tema lo define el manifest (theme_color: #060a12), que es el
         estándar para la app instalada. Se omite el <meta name="theme-color">
         (Chrome/Safari lo tomarían del manifest; Firefox/Opera no lo soportan). -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JugaHoy" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
